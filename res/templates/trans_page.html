{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resort Registration</title>
    
    <!-- Site Icons -->
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'images/apple-touch-icon.png' %}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <!-- Site CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #fbfdfd;
            margin-top: 20px;
            
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .alert {
            margin-bottom: 20px;
        }
        .btn-orange {
            background-color: #FFA500; /* Orange background for buttons */
            border: none; /* No border */
            color: white; /* White text color */
            padding: 10px 20px; /* Padding for buttons */
            border-radius: 5px; /* Rounded corners for buttons */
            cursor: pointer; /* Cursor change on hover */
            width: 100%;
            font-size: 16px;
        }
        .btn-orange:hover {
            background-color: #FF8C00; /* Darker orange on hover */
        }
       
      
    </style>


</head>
<body>
    <header class="top-navbar">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="{% static 'images/logo.png' %}" alt="" />
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbars-rs-food" aria-controls="navbars-rs-food" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbars-rs-food">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item active"><a class="nav-link" href="{% url 'resort_reg' %}">Home</a></li>
                      
                        <li class="nav-item active"><a class="nav-link" href="{% url 'front' %}">Log Out</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>


    <div class="all-page-title page-breadcrumb">
      
        <div class="container text-center">
            <h1 style="color: rgb(20, 19, 19);">Card Details</h1>
           
            <div class="row">
                <div class="col-lg-12">
                
                </div>
            </div>

            <div class="container py-5">
                <div class="jumbotron">

            

    <!-- Main Container -->
    
        <!-- Display Messages -->
        {% if messages %}
            <div class="alert alert-info">
                <ul>
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <!-- Payment Form -->
        <form method="post">
       
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-orange">Pay</button>
        </form>

        <!-- Display Total Amount -->
        <!--   <p class="total-amount">Total Amount: ${{ total_amount }}</p>-->
    </div>

    <!-- JS Files -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
