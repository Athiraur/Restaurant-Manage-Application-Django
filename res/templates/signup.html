
{% load static %}

<!DOCTYPE html>
<html lang="en"><!-- Basic -->
<head>
	<meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">   
   
    <!-- Mobile Metas -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
 
     <!-- Site Metas -->
    <title>Yamifood Restaurant - Responsive HTML5 Template</title>  
    <meta name="keywords" content="">
    <meta name="description" content="">
    <meta name="author" content="">

    <!-- Site Icons -->
    <link rel="shortcut icon" href="{% static 'images/favicon.ico'%}" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <!-- Bootstrap CSS -->

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="{%  static 'css/superslides.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    
    <link rel="stylesheet" href="{%  static 'css/custom.css' %}">
    <link rel="stylesheet" href="{%  static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{%  static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">



    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
      <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        button,.btn{
            background-color:rgba(207, 166, 113, 0.9) ; /* Orange background for buttons */
            width:69rem;
            border: none; /* No border */
            color: white; /* White text color */
            padding: 5px 10px; /* Padding for buttons */
            border-radius: 5px; /* Rounded corners for buttons */
            cursor: pointer; /* Cursor change on hover */
            
        }

        .form-control {
    color: #d0a772;
	background-color: transparent;
	background-image: none;
	border-color: #cfa671;
    
}
.form-control:hover{
	
	background-color: #cfa671;
	border-color: #cfa671;
}
.form-control label {
    color: white;
}
label{
    color: #cfa671;
}

    </style>

</head>

<body>
	<!-- Start header -->
	<header class="top-navbar">
		<nav class="navbar navbar-expand-lg navbar-light bg-light">
			<div class="container">
				<a class="navbar-brand" href="index.html">
					<img src="images/logo.png" alt="" />
				</a>
				<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbars-rs-food" aria-controls="navbars-rs-food" aria-expanded="false" aria-label="Toggle navigation">
				  <span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbars-rs-food">
					<ul class="navbar-nav ml-auto">
						<li class="nav-item active"><a class="nav-link" href="{% url 'front' %}">Home</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'admi_login' %}">Admin Login</a></li>

						<li class="nav-item"><a class="nav-link" href="{% url 'signup' %}">Sign Up</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Sign In</a></li>
						
					</ul>
				</div>
			</div>
		</nav>
	</header>
	<!-- End header -->
	
	<!-- Start All Pages -->
	<div class="all-page-title page-breadcrumb">
		<div class="container text-center">
			<div class="row">
				<div class="col-lg-12">
					<h1>SIGNUP</h1>
				</div>
			</div>
		
	
	<!-- End All Pages -->
	
	<!-- Start Contact -->
	
	
    <div class="row">
        <div class="col-lg-12">
            <div class="heading-title text-center">
                <h2>Sign Up</h2> <!-- Optional Heading -->
            </div>
        </div>
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="{{ form.name.id_for_label }}">Name of Person</label>
            {{ form.name }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.email.id_for_label }}">Email</label>
            {{ form.email }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.gender.id_for_label }}">Gender</label>
            {{ form.gender }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.phone.id_for_label }}">Phone</label>
            {{ form.phone }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}
        </div>
        <br>
    
        <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
    
    <div>
        <p style="color:white;">Already have an account? <a href="{% url 'login' %}" style="color:white;">Login here</a></p>
    </div>
    

    <a href="#" id="back-to-top" title="Back to top" style="display: none;">&uarr;</a>

	<!-- ALL JS FILES -->
    <script src="{% static 'js/jquery-3.2.1.min.js' %}"></script>
    <script src="{% static 'js/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <!-- ALL PLUGINS -->
    <script src="{% static 'js/jquery.superslides.min.js' %}"></script>
    <script src="{% static 'js/images-loded.min.js' %}"></script>
    <script src="{% static 'js/isotope.min.js' %}"></script>
    <script src="{% static 'js/baguetteBox.min.js' %}"></script>
    <script src="{% static 'js/picker.js' %}"></script>
    <script src="{% static 'js/picker.date.js' %}"></script>
    <script src="{% static 'js/picker.time.js' %}"></script>
    <script src="{% static 'js/legacy.js' %}"></script>
    <script src="{% static 'js/form-validator.min.js' %}"></script>
    <script src="{% static 'js/contact-form-script.js' %}"></script>
    <script src="{% static 'js/custom.js' %}"></script>

</body>
</html>
